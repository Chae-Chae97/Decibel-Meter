<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noise Monitoring Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
        
        .header-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        h1 { color: #00e676; font-size: 22px; margin: 0; }
        .lang-btn-group { display: flex; gap: 5px; }
        .lang-btn { font-size: 11px; padding: 4px 8px; background: #333; color: #fff; border-radius: 4px; border: 1px solid #444; }
        .lang-btn.active { background: #00e676; color: #000; font-weight: bold; border-color: #00e676; }
        
        .subtitle { color: #888; font-size: 13px; margin-bottom: 25px; }
        
        .monitor-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #292929; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .monitor-item { border-right: 1px solid #383838; }
        .monitor-item:last-child { border-right: none; }
        .monitor-val { font-size: 32px; font-weight: bold; color: #ffd600; margin-top: 5px; transition: color 0.1s; }
        
        .btn-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        button { font-size: 14px; padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .start-btn { background: #00e676; color: #000; }
        .stop-btn { background: #ff1744; color: #fff; display: none; }
        .report-btn { background: #9c27b0; color: white; }
        .saver-btn { background: #607d8b; color: white; display: none; }
        
        .chart-container { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #333; }
        .indicator-box { background: #252525; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 25px; }
        .indicator-title { font-size: 14px; color: #00e676; font-weight: bold; margin-bottom: 10px; text-align: center; }
        .indicator-grid { display: grid; grid-template-columns: 50px 1fr; gap: 6px; font-size: 12px; }
        .indicator-row { display: contents; }
        .indicator-db { font-weight: bold; color: #ffd600; border-bottom: 1px solid #383838; padding: 6px 0; text-align: right; padding-right: 15px;}
        .indicator-desc { color: #ccc; border-bottom: 1px solid #383838; padding: 6px 0; }

        .table-wrapper { max-height: 200px; overflow-y: auto; border: 1px solid #333; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #292929; color: #00e676; padding: 12px; position: sticky; top: 0; }
        td { padding: 10px 12px; border-bottom: 1px solid #333; }
        tr:nth-child(even) { background: #252525; }

        #battery-saver-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: #555;
        }
    </style>
</head>
<body>

<div id="battery-saver-overlay" onclick="toggleBatterySaver(false)">
    <div style="font-size: 40px; color: #00e676; margin-bottom: 20px;" id="saver-db">00.0 dB</div>
    <div id="txt-saver-hint">측정 중... (화면을 터치하면 해제됩니다)</div>
</div>

<div class="container" id="report-content">
    <div class="header-area">
        <h1 id="txt-title">📊 실시간 데시벨 모니터링</h1>
        <div class="lang-btn-group" id="lang-buttons">
            <button class="lang-btn active" id="btn-ko" onclick="changeLanguage('ko')">KR</button>
            <button class="lang-btn" id="btn-ja" onclick="changeLanguage('ja')">JP</button>
        </div>
    </div>
    <div class="subtitle" id="txt-subtitle">측정 종료 후, 그래프와 전체 데이터가 포함된 종합 보고서를 다운로드할 수 있습니다.</div>
    
    <div class="monitor-box">
        <div class="monitor-item">
            <div style="font-size: 12px; color: #aaa;" id="txt-current-noise">현재 데시벨</div>
            <div id="db-display" class="monitor-val">00.0 dB</div>
        </div>
        <div class="monitor-item">
            <div style="font-size: 12px; color: #aaa;" id="txt-avg-noise">기록된 평균치</div>
            <div id="avg-display" class="monitor-val" style="color: #00e676;">00.0 dB</div>
        </div>
    </div>
    
    <div class="btn-group" id="control-buttons">
        <button class="start-btn" id="startBtn" onclick="startMonitoring()">측정 시작</button>
        <button class="stop-btn" id="stopBtn" onclick="stopMonitoring()">측정 종료</button>
        <button class="saver-btn" id="saverBtn" onclick="toggleBatterySaver(true)">🌙 절전 모드</button>
        <button class="report-btn" id="reportBtn" onclick="downloadFullReport()">📝 종합 보고서 다운로드</button>
    </div>

    <div class="chart-container">
        <canvas id="realtimeChart" style="width:100%; height:180px; background-color: #252525;"></canvas>
    </div>

    <div class="indicator-box">
        <div class="indicator-title" id="txt-ind-title">💡 소음 레벨 기준 (dB)</div>
        <div class="indicator-grid" id="indicator-list"></div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th id="th-num">번호</th>
                    <th id="th-time">측정 시간</th>
                    <th id="th-value">데시벨 수치 (dB)</th>
                </tr>
            </thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const i18n = {
        ko: {
            title: "📊 실시간 데시벨 모니터링",
            subtitle: "측정 종료 후, 그래프와 전체 데이터가 포함된 종합 보고서를 다운로드할 수 있습니다.",
            currentNoise: "현재 데시벨",
            avgNoise: "기록된 평균치",
            btnStart: "측정 시작",
            btnStop: "측정 종료",
            btnSaver: "🌙 절전 모드",
            btnReport: "📝 종합 보고서 다운로드",
            saverHint: "측정 중... (화면을 터치하면 해제됩니다)",
            indTitle: "💡 소음 레벨 기준 (dB)",
            thNum: "번호",
            thTime: "측정 시간",
            thValue: "데시벨 수치 (dB)",
            alertMic: "마이크 권한 허용이 필요합니다: ",
            alertStop: "측정이 종료되었습니다.",
            alertNoData: "저장된 데이터가 없습니다.",
            reportFileName: "데시벨종합보고서",
            chartLabel: "실시간 데시벨 파형",
            repTotalData: "총 측정 데이터",
            repDataCount: "건",
            repSubtitle: "전체 데이터 상세 기록"
        },
        ja: {
            title: "📊 リアルタイムデシベル監視",
            subtitle: "測定終了後、グラフと全データが含まれた統合レポートをダウンロードできます。",
            currentNoise: "現在のデシベル",
            avgNoise: "記録された平均値",
            btnStart: "測定開始",
            btnStop: "測定終了",
            btnSaver: "🌙 節電モード",
            btnReport: "📝 統合レポートダウンロード",
            saverHint: "測定中... (画面をタッチすると解除されます)",
            indTitle: "💡 騒音レベルの目安 (dB)",
            thNum: "番号",
            thTime: "測定日時",
            thValue: "デシベル値 (dB)",
            alertMic: "マイクの許可が必要です: ",
            alertStop: "測定が終了しました。",
            alertNoData: "保存されたデータがありません。",
            reportFileName: "デシベル統合レポート",
            chartLabel: "リアルタイムデシベル波形",
            repTotalData: "総測定データ",
            repDataCount: "個",
            repSubtitle: "全データ詳細記録"
        }
    };

    const indicatorsData = [
        { db: "10", descKo: "숨소리 · 매우 조용함", descJa: "息づかい・きわめて静か" },
        { db: "20", descKo: "나뭇잎 스치는 소리 · 시계 초침", descJa: "木の葉のふれあう音・時計の秒針" },
        { db: "30", descKo: "속삭이는 소리 · 심야의 교외", descJa: "ささやき声・深夜の郊外" },
        { db: "40", descKo: "조용한 도서관 · 주택가 내부", descJa: "静かな図書館・住宅地の室内" },
        { db: "50", descKo: "조용한 사무실 · 보통의 대화", descJa: "静かな事務所・普通の会話" },
        { db: "60", descKo: "일상적인 거리 · 청소기 소리", descJa: "日常の街頭・掃除機" },
        { db: "70", descKo: "시끄러운 사무실 · 전화벨", descJa: "騒がしい事務所・電話のベル" },
        { db: "80", descKo: "지하철 내부 · 시끄러운 공장", descJa: "地下鉄の車内・騒々しい工場" },
        { db: "90+", descKo: "철도 다리 밑 · 청각 손상 주의", descJa: "電車のガード下・聴覚機能に支障" }
    ];

    let currentLang = 'ko';
    let audioContext, analyser, microphone, javascriptNode;
    let isMeasuring = false;
    let globalStream = null;
    let rawCurrentDb = 0; 
    let displayDb = 0;    
    let logInterval, uiInterval;
    let wakeLock = null;
    let recordCounter = 1;
    let totalDbSum = 0;
    let autoStopTimer;
    let fullDataLog = []; 
    const MAX_DATA_POINTS = 6 * 60 * 60; 

    let myChart;
    const ctx = document.getElementById('realtimeChart').getContext('2d');
    
    function initChart() {
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: i18n[currentLang].chartLabel,
                    data: [],
                    borderColor: '#00e676',
                    backgroundColor: 'rgba(0, 230, 118, 0.1)',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    tension: 0
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    y: { 
                        min: 0, max: 120, 
                        grid: { display: true, color: '#444' }, 
                        ticks: { color: '#ccc', callback: function(value) { return value + ' dB'; } } 
                    },
                    x: { 
                        display: true,
                        grid: { display: false },
                        ticks: {
                            color: '#aaa',
                            autoSkip: true,
                            maxTicksLimit: 6, 
                            maxRotation: 0,
                            minRotation: 0
                        }
                    }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    function updateUI() {
        const langData = i18n[currentLang];
        document.getElementById('txt-title').innerText = langData.title;
        document.getElementById('txt-subtitle').innerText = langData.subtitle;
        document.getElementById('txt-current-noise').innerText = langData.currentNoise;
        document.getElementById('txt-avg-noise').innerText = langData.avgNoise;
        document.getElementById('saverBtn').innerText = langData.btnSaver;
        document.getElementById('txt-saver-hint').innerText = langData.saverHint;
        
        if (!isMeasuring) { document.getElementById('startBtn').innerText = langData.btnStart; } 
        else { document.getElementById('stopBtn').innerText = langData.btnStop; }
        
        document.getElementById('reportBtn').innerText = langData.btnReport;
        document.getElementById('txt-ind-title').innerText = langData.indTitle;
        document.getElementById('th-num').innerText = langData.thNum;
        document.getElementById('th-time').innerText = langData.thTime;
        document.getElementById('th-value').innerText = langData.thValue;

        if(myChart) {
            myChart.data.datasets[0].label = langData.chartLabel;
            myChart.update();
        }

        const indGrid = document.getElementById('indicator-list');
        indGrid.innerHTML = '';
        indicatorsData.forEach(item => {
            const desc = (currentLang === 'ko') ? item.descKo : item.descJa;
            indGrid.innerHTML += `<div class="indicator-row">
                <div class="indicator-db">${item.db}</div>
                <div class="indicator-desc">${desc}</div>
            </div>`;
        });
    }

    function changeLanguage(lang) {
        currentLang = lang;
        document.getElementById('btn-ko').classList.remove('active');
        document.getElementById('btn-ja').classList.remove('active');
        document.getElementById(`btn-${lang}`).classList.add('active');
        updateUI();
    }

    function toggleBatterySaver(isOn) {
        document.getElementById('battery-saver-overlay').style.display = isOn ? 'flex' : 'none';
    }

    window.onload = function() {
        initChart();
        updateUI();
    };

    async function startMonitoring() {
        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            if (audioContext.state === 'suspended') { await audioContext.resume(); }

            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(globalStream);
            
            analyser.fftSize = 512;
            microphone.connect(analyser);
            javascriptNode = audioContext.createScriptProcessor(256, 1, 1);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                let values = 0;
                for (let i = 0; i < array.length; i++) { values += array[i]; }
                let average = values / array.length;
                
                rawCurrentDb = average > 0 ? (Math.round(average * 10) / 10) + 30 : 0;
            };

            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); }
            }

            uiInterval = setInterval(() => {
                displayDb = rawCurrentDb;
                document.getElementById('db-display').innerText = displayDb.toFixed(1) + " dB";
                document.getElementById('saver-db').innerText = displayDb.toFixed(1) + " dB";
            }, 100); 

            logInterval = setInterval(recordDataSeconds, 1000); 

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('saverBtn').style.display = 'inline-block';
            isMeasuring = true;
            updateUI();

            autoStopTimer = setTimeout(() => {
                if (isMeasuring) {
                    stopMonitoring();
                    downloadFullReport();
                    alert("6시간 측정 완료! 보고서가 자동으로 다운로드되었습니다.");
                }
            }, 6 * 60 * 60 * 1000);

        } catch (err) {
            alert(i18n[currentLang].alertMic + err.message);
        }
    }

    function recordDataSeconds() {
        if (displayDb === 0 || displayDb > 70) return; // 70dB 초과 시 기록 차단 적용

        const now = new Date();
        const timeStringFull = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        const timeStringChart = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        
        fullDataLog.push({ id: recordCounter, time: timeStringFull, db: displayDb.toFixed(1) });

        totalDbSum += parseFloat(displayDb);
        const currentAverageDb = totalDbSum / recordCounter;
        document.getElementById('avg-display').innerText = currentAverageDb.toFixed(1) + " dB";

        const tbody = document.getElementById('data-table-body');
        const row = `<tr><td>${recordCounter}</td><td>${timeStringFull}</td><td><strong>${displayDb.toFixed(1)} dB</strong></td></tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);

        if (tbody.children.length > 100) { tbody.removeChild(tbody.lastChild); }

        if (isMeasuring) {
            myChart.data.labels.push(timeStringChart); 
            myChart.data.datasets[0].data.push(displayDb);
            
            if (myChart.data.labels.length > MAX_DATA_POINTS) {
                myChart.data.labels.shift();
                myChart.data.datasets[0].data.shift();
            }
            myChart.update();
        }
        
        recordCounter++;
    }

    function stopMonitoring() {
        if (autoStopTimer) clearTimeout(autoStopTimer);
        if (audioContext) audioContext.close();
        if (globalStream) {
            globalStream.getTracks().forEach(track => track.stop());
            globalStream = null;
        }
        if (logInterval) clearInterval(logInterval);
        if (uiInterval) clearInterval(uiInterval);
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }

        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('saverBtn').style.display = 'none';
        toggleBatterySaver(false);
        isMeasuring = false;
        updateUI();
        alert(i18n[currentLang].alertStop);
    }

    function downloadFullReport() {
        if (fullDataLog.length === 0) {
            alert(i18n[currentLang].alertNoData);
            return;
        }

        const chartImageURI = myChart.toBase64Image();
        const reportTitle = i18n[currentLang].reportFileName;
        const avgDbText = document.getElementById('avg-display').innerText;

        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        const formattedDate = `${yyyy}${mm}${dd}`; 

        const langData = i18n[currentLang];

        let htmlContent = `
        <!DOCTYPE html>
        <html lang="${currentLang}">
        <head>
            <meta charset="UTF-8">
            <title>${reportTitle}_${formattedDate}</title>
            <style>
                body { font-family: 'Segoe UI', sans-serif; padding: 20px; color: #333; background: #f4f6f8; margin: 0; }
                .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
                h1 { color: #00c853; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; }
                .summary-box { background: #e8f5e9; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 30px; }
                .summary-box h2 { margin: 0; color: #2e7d32; font-size: 24px; }
                .chart-box { text-align: center; margin: 30px 0; background: #252525; border-radius: 10px; padding: 15px; }
                img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
                table { width: 100%; border-collapse: collapse; margin-top: 30px; font-size: 14px; text-align: center; }
                th { background: #00c853; color: white; padding: 12px; position: sticky; top: 0; }
                td { padding: 10px; border-bottom: 1px solid #ddd; }
                tr:nth-child(even) { background: #f9f9f9; }
                .footer { margin-top: 50px; text-align: center; font-size: 12px; color: #999; }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>${reportTitle} (${yyyy}-${mm}-${dd})</h1>
                
                <div class="summary-box">
                    <p style="margin-top:0; color:#555;">${langData.avgNoise}</p>
                    <h2>${avgDbText}</h2>
                    <p style="margin-bottom:0; font-size:12px; color:#777;">${langData.repTotalData}: ${fullDataLog.length}${langData.repDataCount}</p>
                </div>

                <div class="chart-box">
                    <h3 style="color:#fff; margin-top:0;">${langData.chartLabel}</h3>
                    <img src="${chartImageURI}" alt="Noise Chart Image">
                </div>
                
                <h3 style="color:#444; text-align:center;">📋 ${langData.repSubtitle}</h3>
                <table>
                    <thead>
                        <tr>
                            <th>${langData.thNum}</th>
                            <th>${langData.thTime}</th>
                            <th>${langData.thValue}</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        fullDataLog.forEach(row => {
            htmlContent += `<tr><td>${row.id}</td><td>${row.time}</td><td><strong>${row.db} dB</strong></td></tr>`;
        });

        htmlContent += `
                    </tbody>
                </table>
                <div class="footer">Generated by Real-time Noise Monitoring System</div>
            </div>
        </body>
        </html>
        `;

        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `${reportTitle}_${formattedDate}.html`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
